<!DOCTYPE html>
<html>
<head>
    <title>Admin Sign In - Community Safety</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #dbeafe, #eff6ff 45%, #e0f2fe);
            color: #0f172a;
        }
        .login-card {
            width: min(100%, 420px);
            background: #ffffff;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
            border: 1px solid #dbeafe;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 30px;
            color: #1966d2;
        }
        p {
            margin: 0 0 20px;
            color: #475569;
            line-height: 1.5;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 700;
            color: #334155;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
        }
        input:focus {
            outline: none;
            border-color: #1966d2;
            box-shadow: 0 0 0 3px rgba(25, 102, 210, 0.12);
        }
        button {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 10px;
            background: #1966d2;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover {
            background: #1557b0;
        }
        .error {
            margin-bottom: 16px;
            padding: 10px 12px;
            border-radius: 10px;
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Admin Sign In</h1>
        <p>Enter your admin username and password to open the dashboard.</p>

        {% if error_message %}
            <div class="error">{{ error_message }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('admin_login') }}">
            <input type="hidden" name="next" value="{{ next_url }}">

            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" required autofocus>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>

            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
